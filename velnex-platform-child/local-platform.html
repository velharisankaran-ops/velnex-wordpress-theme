<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velnex Platform Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/platform.css">
</head>
<body>
  <main class="vx-app">
    <section class="vx-auth" aria-label="Velnex platform login">
      <div class="vx-auth-copy">
        <img class="vx-auth-logo" src="https://velnex.in/wp-content/uploads/2026/05/velnex_compact_stacked_1080_transparent-Copy.png" alt="Velnex" />
        <p class="vx-eyebrow">Velnex OS</p>
        <h1>Management, reporting, and portfolio control in one workspace.</h1>
        <div class="vx-auth-points"><span>Business clients</span><span>Investor clients</span><span>Vendor partners</span><span>Velnex team</span></div>
      </div>
      <form class="vx-panel vx-auth-card" data-vx-redirect="local-approved-flow.html">
        <div class="vx-avatar" aria-hidden="true">VN</div>
        <h2>Account Login</h2>
        <label class="vx-field"><span>Email</span><input type="email" name="email" autocomplete="email" required /></label>
        <label class="vx-field"><span>Password</span><input type="password" name="password" autocomplete="current-password" required /></label>
        <div class="vx-row"><label><input type="checkbox" name="remember" /> Remember me</label><button type="button" class="vx-link">Forgot password?</button></div>
        <button class="vx-primary" type="submit">Login</button>
        <a class="vx-plain" href="local-request-access.html">Request access</a>
        <p class="vx-note">Prototype only. Real accounts will use WordPress users and approved roles.</p>
      </form>
    </section>
  </main>
  <script src="assets/platform.js"></script>
</body>
</html>
