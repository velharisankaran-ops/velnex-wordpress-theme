<!-- wp:html -->
<section class="contact section" id="contact" aria-labelledby="contact-title">
        <div class="contact-inner">
          <div>
            <div class="section-kicker">Get in touch</div>
            <h2 id="contact-title">Begin with a focused operating conversation.</h2>
            <p>
              For founders, SME operators, and investors exploring a more accountable management layer, Velnex begins with a practical diagnostic review.
            </p>
          </div>
          <form class="contact-form" data-contact-form>
            <label>
              Name
              <input type="text" name="name" autocomplete="name" required />
            </label>
            <label>
              Email
              <input type="email" name="email" autocomplete="email" required />
            </label>
            <label>
              Mandate Type
              <select name="mandate" required>
                <option value="">Select one</option>
                <option>SME operations mandate</option>
                <option>Investor visibility mandate</option>
                <option>Strategic partnership</option>
              </select>
            </label>
            <label>
              Message
              <textarea name="message" rows="4" required></textarea>
            </label>
            <button class="button primary" type="submit">Prepare enquiry</button>
            <p class="form-note" data-form-note></p>
          </form>
        </div>
      </section>
<!-- /wp:html -->
